name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      
      - name: Restore dependencies
        run: dotnet restore EpubSharp.sln
      
      - name: Build solution
        run: dotnet build EpubSharp.sln --configuration Release --no-restore
      
      - name: Collect artifacts
        run: |
          mkdir -p ./release-artifacts
          cp ./EpubSharp/bin/Release/net9.0/EpubSharp.dll ./release-artifacts/
          cp ./EpubSharp/bin/Release/net9.0/EpubSharp.pdb ./release-artifacts/
          cp ./EpubSharp/bin/Release/net9.0/EpubSharp.deps.json ./release-artifacts/
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: ./release-artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./release-artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
